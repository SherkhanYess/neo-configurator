<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0;}
  body{background:var(--bg-gradient);min-height:100vh;padding:30px 32px;font-family:var(--font-sans);color:var(--text-primary);}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:640px;}
  .media{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(120% 120% at 50% 18%, #1a3f78 0%, #0c1f43 70%);color:rgba(255,255,255,.5);}
  .media svg{width:46px;height:46px;}
  h3{font-family:var(--font-display);font-weight:400;font-size:18px;margin:0;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../card-boot.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
ndBoot(function () {
const { Card, Dialog, Badge, Button, PriceTag } = window.NeoDiamondDesignSystem_7b0c33;
const Gem = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"><path d="M6 3h12l4 6-10 13L2 9Z"/><path d="M11 3 8 9l4 13 4-13-3-6"/><path d="M2 9h20"/></svg>;
const Media = () => <div className="media"><Gem/></div>;

function Demo(){
  return (
    <div>
      <div className="grid">
        <Card media={<Media/>} interactive>
          <Badge tone="champagne">Premium</Badge>
          <h3>Аврора</h3>
          <PriceTag from value={189000} size="sm"/>
        </Card>
        <Card media={<Media/>} interactive selected>
          <Badge tone="accent">VVS1</Badge>
          <h3>Сияние</h3>
          <PriceTag from value={142000} size="sm"/>
        </Card>
        <Card media={<Media/>} interactive>
          <Badge tone="neutral">VS2</Badge>
          <h3>Льдинка</h3>
          <PriceTag from value={94500} size="sm"/>
        </Card>
      </div>
      <Dialog open onClose={()=>{}} title="Сохранить эскиз?" description="Пришлём ссылку на вашу сборку"
        footer={<><Button variant="ghost">Не сейчас</Button><Button variant="primary">Сохранить</Button></>}>
        Ваша сборка кольца будет доступна по личной ссылке 30 дней.
      </Dialog>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
});
</script>
</body>
</html>
