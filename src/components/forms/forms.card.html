<!-- @dsCard group="Components" viewport="700x540" name="Forms — inputs, toggles, sliders" subtitle="Text fields, switch, checkbox/radio, slider, segmented control" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0;}
  body{background:var(--bg-gradient);min-height:100vh;padding:30px 32px;font-family:var(--font-sans);color:var(--text-primary);}
  .sec{margin-bottom:24px;}
  .sec > .nd-eyebrow{display:block;margin-bottom:12px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:560px;}
  .row{display:flex;gap:20px;align-items:center;flex-wrap:wrap;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../card-boot.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
ndBoot(function () {
const { Input, Switch, Checkbox, Slider, SegmentedControl } = window.NeoDiamondDesignSystem_7b0c33;
const Search = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>;

function Demo(){
  const [carat,setCarat]=React.useState(1.0);
  return (
    <div>
      <div className="sec">
        <span className="nd-eyebrow">Input</span>
        <div className="grid">
          <Input label="Имя" placeholder="Как к вам обращаться" />
          <Input label="Поиск" iconLeft={<Search/>} placeholder="Кольца, серьги…" />
          <Input label="Email" defaultValue="anna@example.com" hint="Пришлём эскиз" />
          <Input label="Размер кольца" error="Укажите 14–23" defaultValue="9" />
        </div>
      </div>
      <div className="sec">
        <span className="nd-eyebrow">Switch · Checkbox · Radio</span>
        <div className="row">
          <Switch label="Гравировка" defaultChecked />
          <Switch label="Упаковка" />
          <Checkbox label="Согласие с условиями" defaultChecked />
          <Checkbox type="radio" name="m" label="Белое золото" defaultChecked />
          <Checkbox type="radio" name="m" label="Платина" />
        </div>
      </div>
      <div className="sec">
        <span className="nd-eyebrow">Slider</span>
        <div style={{maxWidth:360}}>
          <Slider label="Вес камня" min={0.3} max={3} step={0.1} value={carat} onChange={setCarat} formatValue={v=>v.toFixed(1)+' кар'} />
        </div>
      </div>
      <div className="sec" style={{marginBottom:0}}>
        <span className="nd-eyebrow">Segmented control</span>
        <div className="row">
          <SegmentedControl options={["Кольца","Серьги","Подвески"]} defaultValue="Кольца" />
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
});
</script>
</body>
</html>
