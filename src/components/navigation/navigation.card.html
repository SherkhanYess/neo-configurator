<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0;}
  body{background:var(--bg-gradient);min-height:100vh;padding:30px 32px;font-family:var(--font-sans);color:var(--text-primary);}
  .panel{max-width:560px;}
  .pane{padding:22px 2px;color:var(--text-secondary);font-size:15px;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../card-boot.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
ndBoot(function () {
const { Tabs } = window.NeoDiamondDesignSystem_7b0c33;
function Demo(){
  const [v,setV]=React.useState("rings");
  const map={rings:"128 колец в каталоге — от классики до авторских сборок.",earrings:"64 пары серёг: пусеты, висячие, конго.",pendants:"Подвески и кулоны под любой повод."};
  return (
    <div className="panel">
      <Tabs value={v} onChange={setV} tabs={[
        {value:'rings',label:'Кольца',count:128},
        {value:'earrings',label:'Серьги',count:64},
        {value:'pendants',label:'Подвески'},
      ]}/>
      <div className="pane">{map[v]}</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
});
</script>
</body>
</html>
